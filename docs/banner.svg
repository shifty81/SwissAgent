<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c9483a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0c0c0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#808080;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="360" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262d" stroke-width="0.5"/>
  </pattern>
  <rect width="1280" height="360" fill="url(#grid)" opacity="0.6"/>

  <!-- Decorative left accent bar -->
  <rect x="0" y="0" width="6" height="360" fill="url(#accent)"/>

  <!-- Swiss Army Knife icon (stylised) -->
  <g transform="translate(90, 90)" filter="url(#shadow)">
    <!-- Handle -->
    <rect x="0" y="60" width="160" height="55" rx="10" ry="10" fill="#c9483a"/>
    <rect x="8" y="68" width="144" height="39" rx="6" ry="6" fill="#e05a4a"/>
    <!-- Cross shield on handle -->
    <rect x="68" y="70" width="24" height="35" rx="2" fill="white" opacity="0.9"/>
    <rect x="60" y="78" width="40" height="19" rx="2" fill="white" opacity="0.9"/>
    <!-- Main blade -->
    <polygon points="160,75 280,63 160,102" fill="url(#blade)" filter="url(#glow)"/>
    <!-- Small tool blade -->
    <polygon points="160,65 240,50 160,72" fill="#a0a0a0"/>
    <!-- Scissor blade -->
    <polygon points="0,95 -60,78 0,102" fill="#b0b0b0"/>
    <polygon points="0,90 -55,105 0,102" fill="#909090"/>
  </g>

  <!-- AI circuit dots (decorative) -->
  <g opacity="0.15">
    <circle cx="900" cy="60" r="3" fill="#58a6ff"/>
    <circle cx="940" cy="80" r="2" fill="#58a6ff"/>
    <circle cx="980" cy="55" r="3" fill="#58a6ff"/>
    <circle cx="1020" cy="75" r="2" fill="#58a6ff"/>
    <circle cx="1060" cy="50" r="3" fill="#58a6ff"/>
    <line x1="900" y1="60" x2="940" y2="80" stroke="#58a6ff" stroke-width="0.8"/>
    <line x1="940" y1="80" x2="980" y2="55" stroke="#58a6ff" stroke-width="0.8"/>
    <line x1="980" y1="55" x2="1020" y2="75" stroke="#58a6ff" stroke-width="0.8"/>
    <line x1="1020" y1="75" x2="1060" y2="50" stroke="#58a6ff" stroke-width="0.8"/>
    <circle cx="920" cy="290" r="3" fill="#3fb950"/>
    <circle cx="970" cy="270" r="2" fill="#3fb950"/>
    <circle cx="1010" cy="295" r="3" fill="#3fb950"/>
    <circle cx="1050" cy="275" r="2" fill="#3fb950"/>
    <line x1="920" y1="290" x2="970" y2="270" stroke="#3fb950" stroke-width="0.8"/>
    <line x1="970" y1="270" x2="1010" y2="295" stroke="#3fb950" stroke-width="0.8"/>
    <line x1="1010" y1="295" x2="1050" y2="275" stroke="#3fb950" stroke-width="0.8"/>
  </g>

  <!-- Main title -->
  <text x="320" y="145" font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="80" font-weight="800" fill="white" filter="url(#shadow)">SwissAgent</text>

  <!-- Red accent underline -->
  <rect x="320" y="158" width="580" height="5" rx="3" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="320" y="210" font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="26" font-weight="400" fill="#8b949e">
    Your offline Swiss Army knife for AI-powered development
  </text>

  <!-- Feature pills row 1 -->
  <rect x="320" y="240" width="130" height="34" rx="17" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="385" y="263" font-family="'Segoe UI', system-ui, sans-serif" font-size="14"
        fill="#58a6ff" text-anchor="middle">🔒 Offline AI</text>

  <rect x="462" y="240" width="130" height="34" rx="17" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="527" y="263" font-family="'Segoe UI', system-ui, sans-serif" font-size="14"
        fill="#3fb950" text-anchor="middle">🔧 35 Modules</text>

  <rect x="604" y="240" width="130" height="34" rx="17" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="669" y="263" font-family="'Segoe UI', system-ui, sans-serif" font-size="14"
        fill="#d2a8ff" text-anchor="middle">🖥️ Monaco IDE</text>

  <rect x="746" y="240" width="130" height="34" rx="17" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="811" y="263" font-family="'Segoe UI', system-ui, sans-serif" font-size="14"
        fill="#ffa657" text-anchor="middle">🤖 Self-Build</text>

  <!-- Bottom row badges -->
  <text x="320" y="320" font-family="'Segoe UI', system-ui, sans-serif" font-size="13"
        fill="#484f58">
    Python 3.10+ · Ollama · FastAPI · MIT License · 16 Phases
  </text>

  <!-- Version badge -->
  <rect x="1140" y="22" width="110" height="30" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="1195" y="42" font-family="'Segoe UI', system-ui, sans-serif" font-size="13"
        fill="#8b949e" text-anchor="middle">v0.2.0</text>
</svg>
