<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwissAgent — Launcher</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1e1e2e;
      --surface:  #252535;
      --surface2: #2a2a3d;
      --border:   #3a3a55;
      --accent:   #7c6af7;
      --accent2:  #56d364;
      --text:     #cdd6f4;
      --text-dim: #7f849c;
      --danger:   #f38ba8;
      --font-ui:  "Segoe UI", "Inter", system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      user-select: none;
      -webkit-app-region: drag;
    }

    /* ── Title bar ── */
    #titlebar {
      height: 36px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      flex-shrink: 0;
    }
    #titlebar .logo { font-size: 14px; font-weight: 700; color: var(--accent); }
    #titlebar .version { font-size: 11px; color: var(--text-dim); }
    #close-btn {
      margin-left: auto;
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 14px;
      cursor: pointer;
      padding: 2px 8px;
      border-radius: 4px;
      -webkit-app-region: no-drag;
      transition: background .15s, color .15s;
    }
    #close-btn:hover { background: var(--danger); color: #fff; }

    /* ── Main layout ── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left brand panel ── */
    #brand {
      width: 200px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 24px 16px;
      flex-shrink: 0;
    }
    #brand .icon { font-size: 52px; line-height: 1; }
    #brand h1 { font-size: 18px; font-weight: 700; color: var(--accent); text-align: center; }
    #brand .tagline { font-size: 11px; color: var(--text-dim); text-align: center; line-height: 1.5; }
    #brand .version-badge {
      font-size: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 2px 10px;
      color: var(--text-dim);
    }

    /* ── Content panel ── */
    #content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 24px;
      gap: 10px;
    }

    /* ── Section header ── */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 2px;
      margin-top: 8px;
    }
    .section-label:first-child { margin-top: 0; }

    /* ── Action cards ── */
    .action-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: background .15s, border-color .15s, transform .1s;
      -webkit-app-region: no-drag;
      text-align: left;
      width: 100%;
    }
    .action-card:hover {
      background: var(--surface2);
      border-color: var(--accent);
    }
    .action-card:active { transform: scale(0.99); }
    .action-card .card-icon { font-size: 26px; flex-shrink: 0; }
    .action-card .card-body { display: flex; flex-direction: column; gap: 2px; }
    .action-card .card-title { font-size: 13px; font-weight: 600; color: var(--text); }
    .action-card .card-desc  { font-size: 11px; color: var(--text-dim); line-height: 1.4; }
    .action-card.accent { border-color: var(--accent); }
    .action-card.accent .card-title { color: var(--accent); }

    /* ── Recent projects list ── */
    #recent-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .recent-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: background .15s;
      -webkit-app-region: no-drag;
      font-size: 12px;
    }
    .recent-item:hover { background: var(--surface2); }
    .recent-item .ri-icon { font-size: 16px; flex-shrink: 0; }
    .recent-item .ri-name { color: var(--text); font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .recent-item .ri-path { color: var(--text-dim); font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px; }
    .recent-item .ri-date { color: var(--text-dim); font-size: 10px; flex-shrink: 0; }
    #no-recent { font-size: 11px; color: var(--text-dim); padding: 4px 0; }

    /* ── Status bar ── */
    #statusbar {
      height: 24px;
      background: var(--accent);
      display: flex;
      align-items: center;
      padding: 0 14px;
      font-size: 11px;
      color: #fff;
      gap: 8px;
      flex-shrink: 0;
    }
    #status-text { flex: 1; }
    #spinner { display: none; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Title bar -->
  <div id="titlebar">
    <span class="logo">🛠 SwissAgent</span>
    <span class="version">v0.2.0</span>
    <button id="close-btn" title="Close">✕</button>
  </div>

  <div id="main">
    <!-- Brand column -->
    <div id="brand">
      <div class="icon">🛠️</div>
      <h1>SwissAgent</h1>
      <div class="tagline">Offline AI-powered<br>development platform</div>
      <div class="version-badge">v0.2.0</div>
    </div>

    <!-- Action cards -->
    <div id="content">
      <div class="section-label">Start</div>

      <button class="action-card accent" id="btn-new">
        <span class="card-icon">📄</span>
        <span class="card-body">
          <span class="card-title">New Project</span>
          <span class="card-desc">Create a new project with AI-assisted scaffold</span>
        </span>
      </button>

      <button class="action-card" id="btn-open">
        <span class="card-icon">📂</span>
        <span class="card-body">
          <span class="card-title">Open Project</span>
          <span class="card-desc">Open an existing project folder</span>
        </span>
      </button>

      <button class="action-card" id="btn-brainstorm">
        <span class="card-icon">💡</span>
        <span class="card-body">
          <span class="card-title">Brainstorm Session</span>
          <span class="card-desc">Chat with local AI to explore and plan ideas</span>
        </span>
      </button>

      <button class="action-card" id="btn-open-ide">
        <span class="card-icon">🛠</span>
        <span class="card-body">
          <span class="card-title">Open IDE</span>
          <span class="card-desc">Go straight to the full SwissAgent IDE</span>
        </span>
      </button>

      <div class="section-label">Recent</div>
      <div id="recent-list">
        <div id="no-recent" style="display:none">No recent projects yet.</div>
      </div>
    </div>
  </div>

  <!-- Status bar -->
  <div id="statusbar">
    <span id="spinner">⟳</span>
    <span id="status-text">Ready — backend starting…</span>
  </div>

  <script>
    'use strict';

    const APP_VERSION = 'v0.2.0';
    const BACKEND_URL = 'http://localhost:8000';
    const RECENT_KEY  = 'swissagent_recent_projects';

    // ── Helpers ──────────────────────────────────────────────────────────────
    function $(id) { return document.getElementById(id); }

    // Populate version badges from the constant
    document.querySelectorAll('.version, .version-badge').forEach(el => {
      el.textContent = APP_VERSION;
    });

    function setStatus(text, spinning = false) {
      $('status-text').textContent = text;
      $('spinner').style.display = spinning ? 'inline' : 'none';
    }

    // ── Recent projects ───────────────────────────────────────────────────────
    function loadRecent() {
      let recent = [];
      try { recent = JSON.parse(localStorage.getItem(RECENT_KEY) || '[]'); } catch {}
      const list  = $('recent-list');
      const empty = $('no-recent');
      // Remove old items (keep only the static "no-recent" div)
      list.querySelectorAll('.recent-item').forEach(el => el.remove());

      if (!recent.length) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      recent.slice(0, 6).forEach(p => {
        const item = document.createElement('button');
        item.className = 'recent-item';
        item.innerHTML = `
          <span class="ri-icon">📁</span>
          <span class="ri-name">${esc(p.name)}</span>
          <span class="ri-path">${esc(p.path)}</span>
          <span class="ri-date">${esc(p.date || '')}</span>`;
        item.addEventListener('click', () => openProject(p.path, p.name));
        list.appendChild(item);
      });
    }

    function addRecent(name, path) {
      let recent = [];
      try { recent = JSON.parse(localStorage.getItem(RECENT_KEY) || '[]'); } catch {}
      recent = recent.filter(p => p.path !== path);
      recent.unshift({ name, path, date: new Date().toLocaleDateString() });
      localStorage.setItem(RECENT_KEY, JSON.stringify(recent.slice(0, 10)));
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Navigation ────────────────────────────────────────────────────────────
    function openIDE(params) {
      const url = params ? `${BACKEND_URL}?${new URLSearchParams(params)}` : BACKEND_URL;
      // Tell the Electron main process to open the IDE window
      if (window.swissagentLauncher) {
        window.swissagentLauncher.openIDE(url);
      } else {
        // Fallback: navigate directly (browser preview mode)
        window.location.href = url;
      }
    }

    function openProject(path, name) {
      if (name && path) addRecent(name, path);
      openIDE({ project: path });
    }

    // ── Backend health poll ───────────────────────────────────────────────────
    let _healthAttempts = 0;
    function pollHealth() {
      fetch(`${BACKEND_URL}/health`)
        .then(r => {
          if (r.ok) {
            setStatus('Backend ready ✓');
          } else {
            scheduleHealthPoll();
          }
        })
        .catch(() => {
          _healthAttempts++;
          if (_healthAttempts < 30) {
            setStatus(`Starting backend… (${_healthAttempts}/30)`, true);
            scheduleHealthPoll();
          } else {
            setStatus('Backend failed to start — check your Python installation.');
          }
        });
    }
    function scheduleHealthPoll() { setTimeout(pollHealth, 1000); }

    // ── Button wiring ─────────────────────────────────────────────────────────
    $('close-btn').addEventListener('click', () => {
      if (window.swissagentLauncher) window.swissagentLauncher.close();
      else window.close();
    });

    $('btn-new').addEventListener('click', () => {
      openIDE({ action: 'new_project' });
    });

    $('btn-open').addEventListener('click', () => {
      if (window.swissagentLauncher) {
        window.swissagentLauncher.pickFolder().then(result => {
          if (result) openProject(result.path, result.name);
        });
      } else {
        openIDE({ action: 'open_project' });
      }
    });

    $('btn-brainstorm').addEventListener('click', () => {
      openIDE({ action: 'brainstorm' });
    });

    $('btn-open-ide').addEventListener('click', () => {
      openIDE();
    });

    // ── Init ──────────────────────────────────────────────────────────────────
    loadRecent();
    pollHealth();
  </script>
</body>
</html>
