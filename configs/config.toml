[agent]
max_iterations = 20
default_llm_backend = "ollama"

[llm.ollama]
base_url = "http://localhost:11434"
model = "llama3"

[llm.api]
base_url = "https://api.openai.com"
key = ""
model = "gpt-4o"

[llm.openwebui]
# URL of your running Open WebUI instance (default port is 3000).
# Install Open WebUI: docker run -d -p 3000:8080 ghcr.io/open-webui/open-webui:main
base_url = "http://localhost:3000"
# API key from Open WebUI → Settings → Account → API Keys (leave blank to use no auth)
key = ""
# Leave blank to auto-select the first available model
model = ""

[llm.localai]
# URL of your running LocalAI instance.
# docker run -d -p 8080:8080 -v $(pwd)/models:/models ghcr.io/mudler/localai:latest
base_url = "http://localhost:8080"
# No API key required for local use — leave blank
key = ""
# Model name as listed by LocalAI (e.g. codestral, deepseek-r1, phi-4)
model = "codestral"

[llm.local]
model_path = "models/model.gguf"

[permissions]
allowed_dirs = ["workspace", "projects", "cache", "logs"]
blocked_dirs = ["configs", "core", "llm"]

[server]
host = "127.0.0.1"
port = 8000

[build]
default_system = "cmake"

[cache]
max_size_mb = 512
